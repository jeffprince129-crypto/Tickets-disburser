<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PT & Logistics | Ticket Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --brand-red: #D32F2F;
            --text-dark: #1a1a1a;
            --white: #ffffff;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: auto;
        }

        /* --- Form Styling --- */
        .booking-form {
            background: var(--white);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            border-top: 5px solid var(--brand-red);
        }

        h2 { color: var(--brand-red); text-align: center; margin-bottom: 25px; }

        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: 600; font-size: 13px; margin-bottom: 5px; }
        
        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
        }

        .btn-generate {
            background: var(--brand-red);
            color: white;
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
        }

        /* --- Ticket Styling --- */
        #ticket-result {
            display: none;
            margin-top: 30px;
        }

        .ticket {
            background: var(--white);
            border: 2px solid var(--brand-red);
            border-radius: 15px;
            overflow: hidden;
            position: relative;
        }

        .ticket-header {
            background: var(--brand-red);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .ticket-body {
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .ticket-info label { color: #888; margin: 0; }
        .ticket-info p { margin: 2px 0 10px 0; font-weight: 700; font-size: 15px; }

        .ticket-footer {
            border-top: 1px dashed #ccc;
            padding: 15px;
            background: #fff9f9;
            text-align: center;
            font-size: 12px;
        }

        .stamp {
            border: 2px solid var(--brand-red);
            color: var(--brand-red);
            padding: 5px;
            display: inline-block;
            font-weight: 800;
            transform: rotate(-10deg);
            margin-top: 10px;
        }

        .btn-download {
            background: #1a1a1a;
            color: white;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            margin-top: 15px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="booking-form" id="form-container">
        <h2>PT & Logistics Booking</h2>
        <form id="ticketForm">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="name" placeholder="Name" required>
            </div>
            <div class="form-group">
                <label>Status</label>
                <select id="status" required>
                    <option value="Student">Student</option>
                    <option value="Staff">Staff</option>
                </select>
            </div>
            <div class="form-group">
                <label>Destination</label>
                <input type="text" id="destination" placeholder="e.g. Lagos, Abuja" required>
            </div>
            <div class="form-group" style="display: flex; gap: 10px;">
                <div style="flex: 1;">
                    <label>Travel Date</label>
                    <input type="date" id="tDate" required>
                </div>
                <div style="flex: 1;">
                    <label>Travel Time</label>
                    <input type="time" id="tTime" required>
                </div>
            </div>
            <div class="form-group">
                <label>Vehicle Type</label>
                <select id="vType">
                    <option value="Bus">Bus</option>
                    <option value="Car">Car</option>
                </select>
            </div>
            <div class="form-group">
                <label>Amount Paid (₦)</label>
                <input type="number" id="amount" placeholder="e.g. 15000" required>
            </div>
            <button type="submit" class="btn-generate">Generate Digital Ticket</button>
        </form>
    </div>

    <div id="ticket-result">
        <div class="ticket" id="capture-area">
            <div class="ticket-header">
                <div style="font-weight: 800; font-size: 20px;">PT & LOGISTICS</div>
                <div style="font-size: 12px; opacity: 0.8;">OFFICIAL TRAVEL PASS</div>
            </div>
            <div class="ticket-body">
                <div class="ticket-info">
                    <label>PASSENGER</label>
                    <p id="pName"></p>
                </div>
                <div class="ticket-info">
                    <label>STATUS</label>
                    <p id="pStatus"></p>
                </div>
                <div class="ticket-info">
                    <label>DESTINATION</label>
                    <p id="pDest"></p>
                </div>
                <div class="ticket-info">
                    <label>DATE & TIME</label>
                    <p id="pDateTime"></p>
                </div>
                <div class="ticket-info">
                    <label>VEHICLE</label>
                    <p id="pVehicle"></p>
                </div>
                <div class="ticket-info">
                    <label>AMOUNT PAID</label>
                    <p id="pAmount"></p>
                </div>
            </div>
            <div class="ticket-footer">
                <strong>Booking Issued On:</strong> <span id="issueStamp"></span><br>
                <div class="stamp">VALID TICKET</div>
                <p style="margin-top: 10px; font-weight: 600; color: var(--brand-red);">
                    *Note: 1 luggage bag allowed per person. Extra bags attract fees.
                </p>
            </div>
        </div>
        <button onclick="downloadTicket()" class="btn-download">Download Ticket (Image)</button>
        <button onclick="window.location.reload()" style="background:none; border:none; color:#666; width:100%; margin-top:10px; cursor:pointer;">Book Another Ride</button>
    </div>
</div>

<script>
    const form = document.getElementById('ticketForm');
    
    form.addEventListener('submit', function(e) {
        e.preventDefault();

        // Map inputs to ticket
        document.getElementById('pName').innerText = document.getElementById('name').value;
        document.getElementById('pStatus').innerText = document.getElementById('status').value;
        document.getElementById('pDest').innerText = document.getElementById('destination').value;
        document.getElementById('pDateTime').innerText = document.getElementById('tDate').value + ' @ ' + document.getElementById('tTime').value;
        document.getElementById('pVehicle').innerText = document.getElementById('vType').value;
        document.getElementById('pAmount').innerText = '₦' + Number(document.getElementById('amount').value).toLocaleString();
        
        // Capture exact time of filling
        const now = new Date();
        document.getElementById('issueStamp').innerText = now.toLocaleDateString() + ' ' + now.toLocaleTimeString();

        // Show ticket, hide form
        document.getElementById('form-container').style.display = 'none';
        document.getElementById('ticket-result').style.display = 'block';
    });

    function downloadTicket() {
        const ticket = document.getElementById('capture-area');
        html2canvas(ticket).then(canvas => {
            const link = document.createElement('a');
            link.download = 'PT-Logistics-Ticket.png';
            link.href = canvas.toDataURL();
            link.click();
        });
    }
</script>

</body>
</html>
